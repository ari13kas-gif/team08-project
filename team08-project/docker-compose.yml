services:
  db:
    image: postgres:15-alpine
    container_name: project_08-db
    environment:
      POSTGRES_DB: "notes_db_08"
      POSTGRES_USER: "notes_user_08"
      POSTGRES_PASSWORD: "password123"
    volumes:
      - pgdata_08:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5408:5432"
    networks:
      - project_08-network
  backend:
    build: ./backend
    container_name: project_08-backend
    environment:
      DB_HOST: db
      DB_NAME: "notes_db_08"
      DB_USER: "notes_user_08"
      DB_PASS: "password123"
    ports:
      - "5008:5000"
    depends_on:
      - db
    networks:
      - project_08-network
  nginx:
    image: nginx:alpine
    container_name: project_08-nginx
    ports:
      - "8008:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - project_08-network
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: project_08-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata_08:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9008:9090"
    depends_on:
      - backend
    networks:
      - project_08-network
  grafana:
    image: grafana/grafana:10.0.0
    container_name: project_08-grafana
    ports:
      - "3008:3000"
    volumes:
      - grafanadata_08:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - project_08-network
volumes:
  pgdata_08:
  promdata_08:
  grafanadata_08:
networks:
  project_08-network:
    name: project_08-network
